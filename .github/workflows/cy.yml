name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecommerce/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ecommerce/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend:
    name: Backend (.NET test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecommerce/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true

      - name: Restore
        run: dotnet restore Ecommerce.slnx

      - name: Build
        run: dotnet build Ecommerce.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Ecommerce.slnx --no-build --configuration Release --verbosity normal /p:CollectCoverage=true /p:CoverletOutput=./TestResults/Coverage/ /p:CoverletOutputFormat=\"cobertura\" /p:Threshold=70 /p:ThresholdType=line /p:ThresholdStat=total

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-cy
          path: ecommerce/backend/**/coverage.cobertura.xml
          if-no-files-found: error