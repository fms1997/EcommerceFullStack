global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: ecommerce-backend-metrics
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8080

  - job_name: ecommerce-backend-health
    metrics_path: /healthz
    static_configs:
      - targets:
          - backend:8080
