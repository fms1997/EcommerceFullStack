name: CI-CD

on:
  pull_request:
    branches: ["*"]
  push:
    branches: ["main", "master", "work"]
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend build & test (.NET)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecommerce/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Ecommerce.slnx

      - name: Build
        run: dotnet build Ecommerce.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Ecommerce.slnx --configuration Release --no-build --verbosity normal /p:CollectCoverage=true /p:CoverletOutput=./TestResults/Coverage/ /p:CoverletOutputFormat=\"cobertura\" /p:Threshold=70 /p:ThresholdType=line /p:ThresholdStat=total

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-ci-cd
          path: ecommerce/backend/**/coverage.cobertura.xml
          if-no-files-found: error

  frontend-quality:
    name: Frontend lint & build (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecommerce/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ecommerce/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-quality]
    defaults:
      run:
        working-directory: ecommerce
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t ecommerce-backend:ci ./backend

      - name: Build frontend image
        run: docker build -f ./frontend/Dockerfile.prod -t ecommerce-frontend:ci ./frontend


  publish-images:
    name: Publish Docker images (main)
    runs-on: ubuntu-latest
    needs: [docker-images]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./ecommerce/backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ecommerce-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./ecommerce/frontend
          file: ./ecommerce/frontend/Dockerfile.prod
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ecommerce-frontend:latest
